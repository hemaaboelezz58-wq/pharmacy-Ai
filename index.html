<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai DrAboElEzz | المساعد المعتمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #131314; --input: #1e1f20; --text: #e3e3e3; --accent: #8ab4f8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c4043; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--accent); text-decoration: none; }
        #chatArea { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; }
        .msg { display: flex; gap: 15px; margin-bottom: 10px; }
        .msg.user { flex-direction: row-reverse; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg.ai .avatar { background: linear-gradient(90deg, #4285f4, #9b72cb); }
        .msg.user .avatar { background: #555; }
        .text { line-height: 1.7; font-size: 1.1rem; padding: 5px; border-radius: 10px; }
        .input-box { padding: 20px; background: var(--bg); }
        .wrapper { background: var(--input); border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; padding: 10px; font-family: 'Cairo'; }
        .btn { color: var(--accent); cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<header>
    <a href="https://wa.me/201129622767" target="_blank" style="color:#b4b4b4; text-decoration:none; font-size:0.9rem;">تواصل مع د. أبوالعز</a>
    <a href="#" class="logo">Ai DrAboElEzz</a>
</header>

<div id="chatArea">
    <div class="container" id="messages">
        <div style="text-align:center; margin-top:50px; color:#b4b4b4;" id="welcome">
            <h2 style="color:white;">نظام Ai DrAboElEzz المحدث</h2>
            <p>أهلاً بك يا دكتور. اسأل عن أي شيء في الكيمياء أو الصيدلة.</p>
        </div>
    </div>
</div>

<div class="input-box">
    <div class="container">
        <div class="wrapper">
            <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeydown="if(event.key==='Enter') send()">
            <div class="btn" onclick="send()">✦</div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBq9VMbC7oeAKochQ_iKuPE6N9tc1WB4g8"; 

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        document.getElementById('welcome').style.display = 'none';
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div class="msg user"><div class="avatar">👤</div><div class="text">${text}</div></div>`;
        input.value = '';

        const aiId = 'ai_' + Date.now();
        msgDiv.innerHTML += `<div class="msg ai" id="${aiId}"><div class="avatar">✨</div><div class="text">جارٍ التحميل...</div></div>`;
        
        const chat = document.getElementById('chatArea');
        chat.scrollTo(0, chat.scrollHeight);

        try {
            // تم تحديث الرابط هنا إلى v1 ليتوافق مع gemini-1.5-flash
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                document.getElementById(aiId).querySelector('.text').innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error(data.error ? data.error.message : "يرجى المحاولة لاحقاً");
            }
        } catch (e) {
            document.getElementById(aiId).querySelector('.text').innerHTML = `<span style="color:#ff6b6b;">خطأ: ${e.message}</span>`;
        }
        chat.scrollTo(0, chat.scrollHeight);
    }
</script>
</body>
</html>
