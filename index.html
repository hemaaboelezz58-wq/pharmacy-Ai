<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai DrAboElEzz | المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131314;
            --input-bg: #1e1f20;
            --text: #e3e3e3;
            --accent: #8ab4f8;
            --ai-grad: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); height: 100vh; margin: 0; display: flex; flex-direction: column; }
        
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c4043; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--accent); }

        #chatArea { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 25px; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; }

        .msg { display: flex; gap: 15px; }
        .msg.user { flex-direction: row-reverse; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg.ai .avatar { background: var(--ai-grad); }
        .msg.user .avatar { background: #555; }
        .text { line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }

        .input-container { padding: 20px; background: var(--bg); }
        .input-wrapper { background: var(--input-bg); border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 1rem; padding: 10px; font-family: 'Cairo'; }
        .send-btn { color: var(--accent); cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

<header>
    <a href="https://wa.me/201129622767" target="_blank" style="color:#b4b4b4; text-decoration:none; font-size:0.9rem;">تواصل مع د. أبوالعز</a>
    <div class="logo">Ai DrAboElEzz</div>
</header>

<div id="chatArea">
    <div class="container" id="messages">
        <div style="text-align:center; margin-top:100px; color:#b4b4b4;" id="welcome">
            <h1 style="color:white; margin-bottom:10px;">أهلاً دكتور</h1>
            <p>تم تفعيل النظام بنجاح. أنا جاهز لمساعدتك الآن.</p>
        </div>
    </div>
</div>

<div class="input-container">
    <div class="container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="اسأل Ai DrAboElEzz..." onkeydown="if(event.key==='Enter') startChat()">
            <div class="send-btn" onclick="startChat()">✦</div>
        </div>
    </div>
</div>

<script>
    // المفتاح الذي قمنا بضبط إعداداته الآن
    const API_KEY = "AIzaSyBq9VMbC7oeAKochQ_iKuPE6N9tc1WB4g8"; 

    async function startChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        document.getElementById('welcome').style.display = 'none';
        const msgDiv = document.getElementById('messages');
        
        // رسالة المستخدم
        msgDiv.innerHTML += `<div class="msg user"><div class="avatar">👤</div><div class="text">${text}</div></div>`;
        input.value = '';

        // مكان رد الـ AI
        const aiId = 'ai_' + Date.now();
        msgDiv.innerHTML += `<div class="msg ai" id="${aiId}"><div class="avatar">✨</div><div class="text">جارٍ التفكير...</div></div>`;
        
        const scrollArea = document.getElementById('chatArea');
        scrollArea.scrollTo(0, scrollArea.scrollHeight);

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                const resultText = data.candidates[0].content.parts[0].text;
                document.getElementById(aiId).querySelector('.text').innerText = resultText;
            } else {
                throw new Error(data.error ? data.error.message : "خطأ مجهول");
            }
        } catch (e) {
            document.getElementById(aiId).querySelector('.text').innerHTML = 
                `<span style="color:#ff6b6b;">يا دكتور، حدثت مشكلة: ${e.message}. تأكد من تحديث صفحة الـ GitHub بعد الحفظ.</span>`;
        }
        scrollArea.scrollTo(0, scrollArea.scrollHeight);
    }
</script>
</body>
</html>
