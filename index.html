<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai DrAboElEzz | المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131314;
            --bg-input: #1e1f20;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --accent: #8ab4f8;
            --grad: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --border: #3c4043;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--accent); }
        .btn-login { background: transparent; color: white; border: 1px solid var(--border); padding: 5px 15px; border-radius: 4px; cursor: pointer; font-family: 'Cairo'; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .content-width { width: 100%; max-width: 800px; }

        #messageList { display: flex; flex-direction: column; gap: 2.5rem; padding-bottom: 150px; }
        .msg { display: flex; gap: 15px; animation: fadeIn 0.3s ease; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .msg.ai .avatar { background: var(--grad); }
        .msg.user .avatar { background: #444; }
        .msg-text { line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; }

        .input-area { position: fixed; bottom: 0; width: 100%; background: var(--bg-dark); padding: 20px 0; }
        .input-box { background: var(--bg-input); border-radius: 30px; padding: 12px 24px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.3s; }
        .input-box:focus-within { border-color: #555; background: #28292a; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-family: 'Cairo'; font-size: 1.1rem; }
        .send-icon { color: var(--accent); cursor: pointer; font-size: 1.4rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div style="display:flex; gap:15px; align-items:center;">
        <button class="btn-login">دخول</button>
        <a href="https://wa.me/201129622767" target="_blank" style="color:var(--text-dim); text-decoration:none; font-size:0.85rem;">الدعم الفني</a>
    </div>
    <div class="logo">Ai DrAboElEzz</div>
</header>

<div class="chat-container" id="scrollArea">
    <div class="content-width" id="messageList">
        <div style="text-align:center; margin-top:15vh; color:var(--text-dim);" id="welcome">
            <h1 style="background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:3rem; margin-bottom:10px;">أهلاً دكتور</h1>
            <p>أنا مساعدك الذكي المحدث. اسألني عن أي شيء في الـ Pharm D.</p>
        </div>
    </div>
</div>

<div class="input-area">
    <div class="content-width" style="margin: 0 auto;">
        <div class="input-box">
            <span style="color:#888; font-size: 1.5rem;">+</span>
            <input type="text" id="userInput" placeholder="اسأل Ai DrAboElEzz..." onkeydown="if(event.key==='Enter') sendMessage()">
            <span class="send-icon" onclick="sendMessage()">✦</span>
        </div>
        <p style="text-align:center; font-size:0.7rem; color:#666; margin-top:10px;">يعمل الآن بمحرك Gemini المحدث خصيصاً لطلاب د. أبوالعز.</p>
    </div>
</div>

<script>
    // المفتاح الجديد الذي أرسلته
    const API_KEY = "AIzaSyBq9VMbC7oeAKochQ_iKuPE6N9tc1WB4g8"; 

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        document.getElementById('welcome').style.display = 'none';
        const list = document.getElementById('messageList');
        const scroll = document.getElementById('scrollArea');

        // إضافة رسالة المستخدم
        list.innerHTML += `<div class="msg user"><div class="msg-text">${text}</div><div class="avatar">👤</div></div>`;
        input.value = '';
        scroll.scrollTo(0, scroll.scrollHeight);

        // إضافة رسالة الانتظار
        const aiId = 'ai_' + Date.now();
        list.innerHTML += `<div class="msg ai" id="${aiId}"><div class="avatar">✨</div><div class="msg-text">جارٍ التحميل...</div></div>`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content.parts[0].text) {
                document.getElementById(aiId).querySelector('.msg-text').innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error();
            }
        } catch (e) {
            document.getElementById(aiId).querySelector('.msg-text').innerHTML = 
                "<span style='color:#ff6b6b;'>حدث خطأ. تأكد من تفعيل المفتاح الجديد في Google AI Studio.</span>";
        }
        scroll.scrollTo(0, scroll.scrollHeight);
    }
</script>
</body>
</html>
