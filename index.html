<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ai DrAboElEzz | المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #131314;
  --bg-input: #1e1f20;
  --text-main: #e3e3e3;
  --text-dim: #b4b4b4;
  --accent: #4285f4;
  --grad: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
  --border-color: #3c4043;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; }

/* Header */
header { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: rgba(19, 19, 20, 0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 100; }
.logo { font-weight: 900; font-size: 1.3rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.user-action { display: flex; align-items: center; gap: 15px; }
.login-btn { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
.login-btn:hover { background: #444; }

/* Main Chat Area */
.chat-window { flex: 1; display: flex; flex-direction: column; padding-top: 80px; overflow-y: auto; align-items: center; scroll-behavior: smooth; }
.container { width: 100%; max-width: 850px; padding: 1rem; }

/* Welcome State */
.welcome-hero { text-align: center; margin-top: 10vh; }
.welcome-hero h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 0.5rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.welcome-hero p { color: var(--text-dim); font-size: 1.2rem; }

/* Message List */
#messageList { display: flex; flex-direction: column; gap: 2.5rem; width: 100%; padding-bottom: 150px; }
.msg-row { display: flex; gap: 18px; width: 100%; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.msg-row.ai .avatar { background: var(--grad); }
.msg-row.user .avatar { background: #3c4043; }
.msg-content { line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; }

/* Floating Input */
.bottom-bar { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, var(--bg-dark) 30%); padding: 20px 0 40px 0; }
.input-container { max-width: 800px; margin: 0 auto; padding: 0 1rem; }
.input-box { background: var(--bg-input); border-radius: 32px; border: 1px solid transparent; padding: 8px 24px; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
.input-box:focus-within { background: #28292a; border-color: #555; }
input { flex: 1; background: none; border: none; color: white; height: 48px; font-size: 1.1rem; outline: none; font-family: 'Cairo'; }
.send-btn { cursor: pointer; color: var(--accent); font-size: 1.4rem; padding: 5px; opacity: 0.5; transition: 0.3s; }
.send-btn.active { opacity: 1; transform: scale(1.1); }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo">Ai DrAboElEzz ⚕️</div>
  <div class="user-action">
    <div onclick="window.open('https://wa.me/201129622767')" style="cursor:pointer; color:var(--text-dim); font-size:0.9rem;">تواصل مع د. أبوالعز</div>
    <button class="login-btn">دخول</button>
  </div>
</header>

<div class="chat-window" id="chatWindow">
  <div class="container">
    <div class="welcome-hero" id="welcomeHero">
      <h1>مرحباً، دكتور</h1>
      <p>أنا مساعدك الصيدلي الذكي، اسألني عن أي مادة أو تحليل أو اطلب مساعدة برمجية.</p>
    </div>
    <div id="messageList"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="input-container">
    <div class="input-box">
      <span style="color:var(--text-dim); cursor:pointer;">➕</span>
      <input type="text" id="userInput" placeholder="اسأل Ai DrAboElEzz..." oninput="checkInput()">
      <div id="sendBtn" class="send-btn" onclick="handleChat()">✦</div>
    </div>
    <p style="text-align:center; font-size:0.75rem; color:#888; margin-top:12px;">قد يخطئ الذكاء الاصطناعي، يرجى مراجعة المصادر الطبية الموثوقة.</p>
  </div>
</div>

<script>
// المفتاح البرمجي والمحرك المعتمد
const API_KEY = "AIzaSyC6XaDiYXSCjSxNYwDnqWN3bDTpqhhzzPM";
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

function checkInput() {
    const val = document.getElementById('userInput').value;
    document.getElementById('sendBtn').classList.toggle('active', val.length > 0);
}

async function handleChat() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const list = document.getElementById('messageList');
    const hero = document.getElementById('welcomeHero');
    const window = document.getElementById('chatWindow');

    // إخفاء واجهة الترحيب عند أول رسالة
    hero.style.display = 'none';

    // إضافة رسالة المستخدم
    list.innerHTML += `
        <div class="msg-row user">
            <div class="avatar">👤</div>
            <div class="msg-content">${text}</div>
        </div>
    `;

    input.value = '';
    checkInput();
    window.scrollTo(0, window.scrollHeight);

    // إضافة رسالة "جاري التفكير"
    const thinkingId = 'ai_' + Date.now();
    list.innerHTML += `
        <div class="msg-row ai" id="${thinkingId}">
            <div class="avatar">✨</div>
            <div class="msg-content">...</div>
        </div>
    `;

    try {
        const response = await fetch(`${API_URL}?key=${API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
        });

        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;

        // تحديث رسالة الذكاء الاصطناعي بالرد الحقيقي
        document.getElementById(thinkingId).querySelector('.msg-content').innerText = aiText;
        window.scrollTo(0, window.scrollHeight);

    } catch (error) {
        document.getElementById(thinkingId).querySelector('.msg-content').innerText = "عذراً يا دكتور، تعذر الاتصال بالمحرك. تأكد من اتصال الإنترنت.";
    }
}

// تفعيل الإرسال عند الضغط على Enter
document.getElementById('userInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleChat();
});
</script>

</body>
</html>
