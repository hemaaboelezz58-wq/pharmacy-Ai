<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai DrAboElEzz | المساعد الصيدلي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #131314;
            --bg-input: #1e1f20;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --accent: #8ab4f8;
            --grad: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --border: #3c4043;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Header */
        header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 1.5rem; 
            z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--accent); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: white; }
        .btn-login { background: #131314; color: white; border: 1px solid var(--border); padding: 6px 16px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; }

        /* Main Chat Area */
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px;
            scroll-behavior: smooth;
        }
        .content-width { width: 100%; max-width: 800px; padding: 0 1.5rem; }

        /* Welcome State */
        .welcome-screen { text-align: center; margin-top: 10vh; }
        .welcome-screen h1 { 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            margin-bottom: 1rem; 
            background: var(--grad); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .welcome-screen p { color: var(--text-dim); font-size: 1.2rem; }

        /* Message Styles */
        #messageList { display: flex; flex-direction: column; gap: 2.5rem; padding-bottom: 150px; }
        .msg { display: flex; gap: 15px; width: 100%; animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .avatar { 
            width: 35px; height: 35px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; font-size: 1rem; 
        }
        .msg.ai .avatar { background: var(--grad); color: white; }
        .msg.user .avatar { background: var(--border); color: white; }
        .msg-text { line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; padding-top: 4px; }

        /* Bottom Input Bar */
        .input-area { 
            position: fixed; bottom: 0; width: 100%; 
            background: var(--bg-dark); 
            padding: 20px 0 30px 0; 
        }
        .input-box-container { 
            background: var(--bg-input); 
            border-radius: 30px; 
            padding: 10px 24px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .input-box-container:focus-within { border-color: #555; background: #28292a; }
        input { 
            flex: 1; background: none; border: none; 
            color: white; outline: none; font-family: 'Cairo'; 
            font-size: 1.1rem; height: 45px;
        }
        .icon { color: var(--text-dim); cursor: pointer; font-size: 1.3rem; transition: 0.2s; }
        .icon:hover { color: white; }
        .send-btn { color: var(--accent); font-weight: bold; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="nav-links">
        <button class="btn-login">دخول</button>
        <a href="https://wa.me/201129622767" target="_blank">تواصل مع د. أبوالعز</a>
    </div>
    <div class="logo">Ai DrAboElEzz</div>
</header>

<div class="chat-container" id="chatContainer">
    <div class="content-width">
        <div class="welcome-screen" id="welcomeScreen">
            <h1>مرحباً، دكتور</h1>
            <p>أنا مساعدك الصيدلي الذكي. اسألني عن أي مادة علمية أو تحليل أو اطلب المساعدة في مشروعك.</p>
        </div>
        <div id="messageList"></div>
    </div>
</div>

<div class="input-area">
    <div class="content-width">
        <div class="input-box-container">
            <span class="icon">＋</span>
            <input type="text" id="userInput" placeholder="اسأل Ai DrAboElEzz..." autocomplete="off">
            <span class="icon send-btn" id="sendBtn" onclick="sendMessage()">✦</span>
        </div>
        <p style="text-align: center; color: #80868b; font-size: 0.75rem; margin-top: 12px;">
            قد يخطئ الذكاء الاصطناعي، يرجى مراجعة المصادر العلمية الموثوقة لطلاب Pharm D.
        </p>
    </div>
</div>

<script>
    // الإعدادات التقنية لربط المحرك
    const API_KEY = "AIzaSyC6XaDiYXSCjSxNYwDnqWN3bDTpqhhzzPM";
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        const welcome = document.getElementById('welcomeScreen');
        const list = document.getElementById('messageList');
        const container = document.getElementById('chatContainer');

        // إخفاء الترحيب وإظهار الرسائل
        welcome.style.display = 'none';

        // إضافة رسالة المستخدم
        list.innerHTML += `
            <div class="msg user">
                <div class="avatar">👤</div>
                <div class="msg-text">${text}</div>
            </div>
        `;

        input.value = '';
        container.scrollTo(0, container.scrollHeight);

        // رسالة انتظار الذكاء الاصطناعي
        const aiMsgId = 'ai_' + Date.now();
        list.innerHTML += `
            <div class="msg ai" id="${aiMsgId}">
                <div class="avatar">✨</div>
                <div class="msg-text">... جارٍ المعالجة</div>
            </div>
        `;

        try {
            const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            // تحديث الرسالة بالرد الفعلي
            document.getElementById(aiMsgId).querySelector('.msg-text').innerText = aiResponse;
            container.scrollTo(0, container.scrollHeight);

        } catch (error) {
            document.getElementById(aiMsgId).querySelector('.msg-text').innerText = "عذراً دكتور، حدث خطأ في الاتصال. تأكد من إعدادات الـ API.";
        }
    }

    // دعم الإرسال عبر زر Enter
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
